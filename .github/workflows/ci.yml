name: CI

on:
  push:
    branches: [main, develop, master]
    tags: ['v*']
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.example.com
          VITE_BYNDER_BASE_URL: https://bynder.example.com
          VITE_OAUTH_CALLBACK_URL: https://app.example.com
          VITE_OAUTH_CLIENT_ID: placeholder

